# ============================================================
# Kerfur global tuning parameters
# Single source of truth for all tweakable values.
# Edit and relaunch - no rebuild needed.
# Live-tune a running node with: ros2 param set /<node> <param> <value>
# ============================================================

emotion_engine:
  ros__parameters:
    publish_rate_hz: 10.0
    decay_tau_sec: 25.0          # mood persistence; higher = lingers longer
    initial_mode: "default"
    # --- future: baseline bias (decay target instead of zero) ---
    # baseline_pleasure: 0.3
    # baseline_arousal: -0.2
    # baseline_dominance: 0.1
    # --- future: saturation softening ---
    # saturation_exponent: 0.5

pad_to_expression:
  ros__parameters:
    hysteresis: 0.1
    connection_timeout_sec: 2.0
    # --- future: limit-break thresholds ---
    # overload_pleasure_threshold: 1.3
    # sleep_arousal_threshold: -1.0

subconscious:
  ros__parameters:
    backend: "ollama"
    ollama_host: "192.168.40.15:11434"
    ollama_model: "llama3.1:latest"

expression_bridge:
  ros__parameters:
    hub_url: "ws://localhost:8000/ws"


perception_head:
  ros__parameters:
    publish_rate_hz: 20.0          # rate we publish /head/detection (behavior layer consumes ~20Hz)
    freshness_timeout_sec: 0.4     # older than this -> publish label "" (idle); avoids stale-confident gaze
    confidence_threshold: 0.5      # ignore detections below this confidence
    target_labels: ["person", "face"]   # [] = accept every label the model emits
    hailo_input: "/dev/video0"     # USB UVC path for the Arducam; "rpi" for a CSI cam
    hef_path: ""                   # "" = let Hailo auto-pick by detected arch (hailo10h/)


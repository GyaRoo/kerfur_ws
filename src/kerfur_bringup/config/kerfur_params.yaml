# ============================================================
# Kerfur global tuning parameters
# Single source of truth for all tweakable values.
# Edit and relaunch - no rebuild needed.
# Live-tune a running node with: ros2 param set /<node> <param> <value>
# ============================================================

emotion_engine:
  ros__parameters:
    publish_rate_hz: 10.0
    decay_tau_sec: 25.0          # mood persistence; higher = lingers longer
    initial_mode: "default"
    # --- future: baseline bias (decay target instead of zero) ---
    # baseline_pleasure: 0.3
    # baseline_arousal: -0.2
    # baseline_dominance: 0.1
    # --- future: saturation softening ---
    # saturation_exponent: 0.5

pad_to_expression:
  ros__parameters:
    hysteresis: 0.1
    connection_timeout_sec: 2.0
    # --- future: limit-break thresholds ---
    # overload_pleasure_threshold: 1.3
    # sleep_arousal_threshold: -1.0

subconscious:
  ros__parameters:
    backend: "ollama"
    ollama_host: "192.168.40.15:11434"
    ollama_model: "llama3.1:latest"

expression_bridge:
  ros__parameters:
    hub_url: "ws://localhost:8000/ws"


# --- append to / replace in kerfur_bringup/config/kerfur_params.yaml ---
# Replaces the earlier 'perception_head' section - the in-process Hailo node was
# superseded by the two-process detector(socket)+bridge split.
# Node name MUST match: super().__init__("detection_bridge"), launch name=, and
# this section header.

detection_bridge:
  ros__parameters:
    detector_host: "127.0.0.1"     # where kerfur_detector.py's socket lives
    detector_port: 8766            # must match SOCKET_PORT in kerfur_detector.py
    publish_rate_hz: 20.0          # throttled publish rate onto /head/detection
    freshness_timeout_sec: 0.4     # older than this -> publish label "" (idle)

